name: Build and deploy PDFs

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - submodule-updated

permissions:
  contents: write

concurrency:
  group: build-deploy-branch
  cancel-in-progress: false

env:
  DEPLOY_BRANCH: deploy
  DEPLOY_DIR: dist
  SITE_TITLE: math
  SUBMODULE_DEPLOY_KEY: ${{ secrets.SUBMODULE_DEPLOY_KEY }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Install workflow dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git openssh-client python3 ca-certificates

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: true

      - name: Mark repository as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Make scripts executable
        run: chmod +x .github/scripts/*.sh .github/scripts/*.py

      - name: Configure submodule authentication
        run: .github/scripts/setup-submodule-auth.sh

      - name: Checkout submodules
        run: |
          if [ -f .gitmodules ]; then
            git submodule sync --recursive
            git submodule update --init --recursive
          fi

      - name: Build PDFs
        run: .github/scripts/build.sh

      - name: Generate index pages
        run: .github/scripts/generate-index.py

      - name: Prepare deploy directory
        run: .github/scripts/prepare-deploy-dir.sh "$DEPLOY_DIR"

      - name: Push deploy branch
        run: .github/scripts/push-deploy-branch.sh "$DEPLOY_DIR"
